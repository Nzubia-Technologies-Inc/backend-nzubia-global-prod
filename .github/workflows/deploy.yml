name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build, Test & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      # ── SSH setup ────────────────────────────────────────────────────────────
      # Prerequisites (one-time setup):
      #   1. Generate a key pair:  ssh-keygen -t ed25519 -f deploy_key
      #   2. Add the public key to the server:
      #        ssh-copy-id -i deploy_key.pub root@<SERVER_HOST>
      #   3. Add GitHub repository secrets:
      #        SSH_PRIVATE_KEY  → contents of deploy_key (private key)
      #        SERVER_HOST      → 165.232.40.77

      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Ensure server release directory exists
        run: |
          ssh root@${{ secrets.SERVER_HOST }} 'mkdir -p /root/apps/api'

      # ── Sync artifacts ───────────────────────────────────────────────────────
      # Keep the server release root minimal: only dist/ and package-lock.json.
      # The running container is refreshed from /root/apps/api/dist after sync.

      - name: Sync dist to server
        run: |
          rsync -az --delete \
            dist/ \
            root@${{ secrets.SERVER_HOST }}:/root/apps/api/dist/

      - name: Sync package lock
        run: |
          rsync -az \
            package-lock.json \
            root@${{ secrets.SERVER_HOST }}:/root/apps/api/

      # ── Refresh running container ────────────────────────────────────────────

      - name: Copy dist into container
        run: |
          ssh root@${{ secrets.SERVER_HOST }} '
            docker cp /root/apps/api/dist/. nzubia-api:/app/dist/
          '

      - name: Restart nzubia-api container
        run: |
          ssh root@${{ secrets.SERVER_HOST }} '
            docker restart nzubia-api
          '

      # ── Smoke test ───────────────────────────────────────────────────────────

      - name: Wait for container to be ready
        run: |
          ssh root@${{ secrets.SERVER_HOST }} '
            for i in $(seq 1 15); do
              STATUS=$(curl -s --max-time 5 -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/api/v1/platform-settings)
              if [ "$STATUS" != "000" ]; then
                echo "Container ready (HTTP $STATUS)"
                exit 0
              fi
              echo "Waiting... attempt $i"
              sleep 2
            done
            echo "Container did not respond in time"
            exit 1
          '

      - name: Smoke test
        run: |
          ssh root@${{ secrets.SERVER_HOST }} '
            STATUS=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/api/v1/platform-settings)
            echo "HTTP $STATUS"
            # Accept any response except 5xx or connection failure (000)
            if [ "$STATUS" = "000" ] || [ "$STATUS" -ge 500 ] 2>/dev/null; then
              echo "Smoke test failed: HTTP $STATUS"
              docker logs --tail 80 nzubia-api
              exit 1
            fi
            echo "Smoke test passed"
          '

      - name: Print container status
        if: always()
        run: |
          ssh root@${{ secrets.SERVER_HOST }} \
            'docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"'
