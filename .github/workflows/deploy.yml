name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build, Test & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      # ── SSH setup ────────────────────────────────────────────────────────────

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/nzubia_deploy_key
          chmod 600 ~/.ssh/nzubia_deploy_key
          printf "Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n  IdentityFile ~/.ssh/nzubia_deploy_key\n" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      # ── Sync artifacts ───────────────────────────────────────────────────────

      - name: Ensure server release directory exists
        run: ssh root@${{ secrets.SERVER_HOST }} 'mkdir -p /root/apps/api'

      - name: Sync dist to server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/nzubia_deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            dist/ \
            root@${{ secrets.SERVER_HOST }}:/root/apps/api/dist/

      - name: Sync package lock
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/nzubia_deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            package-lock.json \
            root@${{ secrets.SERVER_HOST }}:/root/apps/api/

      # ── Refresh running container ────────────────────────────────────────────

      - name: Copy dist into container and restart
        run: |
          ssh root@${{ secrets.SERVER_HOST }} \
            'docker cp /root/apps/api/dist/. nzubia-api:/app/dist/ && docker restart nzubia-api'

      # ── Smoke test ───────────────────────────────────────────────────────────

      - name: Wait for container to be ready
        run: |
          ssh root@${{ secrets.SERVER_HOST }} '
            for i in $(seq 1 15); do
              STATUS=$(curl -s --max-time 5 -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/api/v1/platform-settings)
              if [ "$STATUS" != "000" ]; then
                echo "Container ready (HTTP $STATUS)"
                exit 0
              fi
              echo "Waiting... attempt $i"
              sleep 2
            done
            echo "Container did not respond in time"
            exit 1
          '

      - name: Smoke test
        run: |
          ssh root@${{ secrets.SERVER_HOST }} '
            STATUS=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/api/v1/platform-settings)
            echo "HTTP $STATUS"
            if [ "$STATUS" = "000" ] || [ "$STATUS" -ge 500 ] 2>/dev/null; then
              echo "Smoke test failed: HTTP $STATUS"
              docker logs --tail 80 nzubia-api
              exit 1
            fi
            echo "Smoke test passed"
          '

      - name: Print container status
        if: always()
        run: |
          ssh root@${{ secrets.SERVER_HOST }} \
            'docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"'
